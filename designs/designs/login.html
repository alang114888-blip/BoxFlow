<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c3bed",
                        "background-light": "#f7f6f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 59, 237, 0.2);
        }
        .glow-purple {
            box-shadow: 0 0 20px rgba(124, 59, 237, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-x-hidden">
<!-- Decorative Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Main Container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 md:p-8">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="w-full h-full bg-cover bg-center opacity-30 grayscale" data-alt="Moody high-end gym interior with heavy weights" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD_cGo99Pzk5RIKB4sf-7h1isdvLt5pQQxit4XP4Yy5fZhIfZUnPj0L6bfu9MCIrhV61PlkyXZlkNS5oJCV5zVwXgdtk1gcZwMqHDLLHpLKhHndQgKagjjWrNPXiL30_-b9hBL_v2gbPK_37AGtGB2LycoeajmkLvmLyJ6kzf2jUhfszkGgW9q9dBShPe81pFjr5Rn_hnc3127CZpISUwnnzLUV_vUNb6ngGDYmeDXrxqBl6WZh6WWV7Uzwm-yOsI1j_LsBTYMYHfs');">
</div>
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/80 via-background-dark/95 to-background-dark"></div>
</div>
<!-- Content Content -->
<div class="z-10 w-full max-w-md flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10 flex flex-col items-center group">
<div class="w-20 h-20 bg-primary rounded-2xl flex items-center justify-center mb-4 glow-purple transition-transform group-hover:scale-105 duration-300">
<span class="material-symbols-outlined text-white text-5xl">exercise</span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-white">Box<span class="text-primary">Flow</span></h1>
<p class="text-slate-400 mt-2 font-light">Train smarter, flow better</p>
</div>
<!-- Login Card -->
<div class="glass-panel w-full p-8 rounded-xl shadow-2xl">
<h2 class="text-2xl font-semibold text-white mb-6 text-center">Welcome Back</h2>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3.5 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-300">Password</label>
<a class="text-xs text-slate-400 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-3.5 pl-12 pr-12 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2 ml-1">
<input class="rounded border-slate-700 bg-slate-900 text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember" type="checkbox"/>
<label class="text-sm text-slate-400" for="remember">Keep me logged in</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-gradient-to-r from-primary to-purple-500 text-white font-semibold py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:scale-[1.01] active:scale-[0.99] transition-all duration-200 mt-2">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-[#1e293b] px-2 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid gap-4">
<button class="flex items-center justify-center gap-2 bg-slate-800/50 hover:bg-slate-800 border border-slate-700 py-3 rounded-lg text-sm font-medium transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
                        Google
                    </button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex flex-col items-center space-y-4">
<p class="text-slate-400">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Create Account</a>
</p>
<div class="flex gap-4 text-xs text-slate-500">
<a class="hover:text-slate-300" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-slate-700 self-center"></span>
<a class="hover:text-slate-300" href="#">Terms of Service</a>
</div>
</div>
</div>
</div>
</body></html>
